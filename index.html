<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index - Prescript Generator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/img/index.png">
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="assets/img/index.png" alt="The Index Logo" class="logo" id="indexLogo">
        </div>

        <div class="prescript-text" id="prescriptDisplay" aria-live="polite">Click below to receive the Will of the Prescript.</div>

        <button class="generate-btn" id="generateBtn">Receive Will</button>
    </div>

    <audio id="beeperSfx" src="assets/audio/beeper.mp3" preload="auto"></audio>

    <footer style="position: absolute; bottom: 15px; font-size: 0.75rem; color: #1a2e3b; letter-spacing: 1px; display: flex; align-items: center; gap: 4px;">
      <span>&copy; 2026 Designed by </span>
      <a href="https://github.com/senpai1135/the-index-prescript" target="_blank" style="color: inherit; text-decoration: none; cursor: default;">senpai1135</a>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
